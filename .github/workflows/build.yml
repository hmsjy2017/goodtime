name: Build Goodtime iOS for TrollStore

on:
  workflow_dispatch: 

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3

      - name: 优化 Gradle 内存并修复权限
        run: |
          chmod +x ./gradlew
          # 给 Gradle 分配更多内存，防止 Kotlin 编译时 OOM 崩溃
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" >> gradle.properties
          ./gradlew --version

      - name: 注入 KMP Xcode 环境 (修复 PhaseScriptExecution)
        run: |
          # 寻找 iOS 目录
          if [ -d "iosApp" ]; then
            cd iosApp
          elif [ -d "ios" ]; then
            cd ios
          else
            echo "未找到 iOS 工程目录！"
            exit 1
          fi
          
          # 【核心修复】创建 .xcode.env.local 文件，KMP 编译脚本会自动读取它
          echo "export JAVA_HOME=\"$JAVA_HOME\"" > .xcode.env.local
          
          echo "已成功注入 Java 路径到 Xcode 环境："
          cat .xcode.env.local

      - name: 编译并构建 iOS App
        run: |
          if [ -d "iosApp" ]; then
            cd iosApp
            PROJECT_NAME="iosApp"
          else
            cd ios
            PROJECT_NAME="ios"
          fi
          
          # 执行 Xcode 编译
          xcodebuild clean build \
            -project ${PROJECT_NAME}.xcodeproj \
            -scheme ${PROJECT_NAME} \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: 打包为 TrollStore IPA
        run: |
          mkdir -p Payload
          find . -name "*.app" -path "*/build_output/Build/Products/Release-iphoneos/*" -exec cp -r {} Payload/ \;
          zip -qr Goodtime-TrollStore.ipa Payload

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Goodtime-iOS-IPA
          path: Goodtime-TrollStore.ipa
          retention-days: 7
