name: Build Goodtime iOS for TrollStore

on:
  workflow_dispatch: 

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3

      - name: 预热 Gradle 环境 (预下载依赖并修复权限)
        run: |
          # 确保根目录的 Gradle Wrapper 有可执行权限
          chmod +x ./gradlew
          # 运行一次基础命令，让系统提前下载好 Gradle 核心包，防止 Xcode 编译时因为网络下载超时而闪退
          ./gradlew --version

      - name: 编译并构建 iOS App (无签名)
        run: |
          if [ -d "iosApp" ]; then
            cd iosApp
            PROJECT_NAME="iosApp"
          elif [ -d "ios" ]; then
            cd ios
            PROJECT_NAME="ios"
          else
            echo "未找到 iOS 工程目录，请检查仓库结构！"
            exit 1
          fi
          
          # 执行 Xcode 编译，关键点：在末尾强制传入 JAVA_HOME
          xcodebuild clean build \
            -project ${PROJECT_NAME}.xcodeproj \
            -scheme ${PROJECT_NAME} \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            JAVA_HOME="$JAVA_HOME"

      - name: 打包为 TrollStore 适用的 IPA
        run: |
          mkdir -p Payload
          find . -name "*.app" -path "*/build_output/Build/Products/Release-iphoneos/*" -exec cp -r {} Payload/ \;
          zip -qr Goodtime-TrollStore.ipa Payload

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Goodtime-iOS-IPA
          path: Goodtime-TrollStore.ipa
          retention-days: 7
